{% load static %}
<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="{% static 'css/create_post.css' %}">
		<title>Django Public Blog - создать статью</title>
	</head>
	<body>
		<div class="content">
			<h1>Написать статью</h1>
			<form method="POST">
				{% csrf_token %}
				<input type="text" name="title" placeholder="Название статьи"
				value="{{ form.title|default:'' }}">
				{% if form.title.errors %}
	            	<div class="error">
	                	{{ form.title.errors }}
	            	</div>
        		{% endif %}
				<br>
				<textarea name="text" placeholder="Текст статьи">{{ form.text|default:'' }}</textarea><br>
				<input type="submit" value="Сохранить"><br>
			</form>
			{{ form.errors }}
		</div>
	</body>
</html>
