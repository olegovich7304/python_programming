{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
	<title>Архив всех статей</title>
</head>
<body> 
	<a class="link" href="http://127.0.0.1:8000/article/new/">написать статью</a>
	<a class="link" href="http://127.0.0.1:8000/registration/">регистрация</a>
	<a class="link" href="http://127.0.0.1:8000/auth/">авторизация</a>
   <div class="header">
		<img class="logo" src="{% static 'img/dpb-logo.png' %}"/>
   </div>
   <div class="archive">
	{% for post in posts %}
	<div class="one-post">
		<div class="post-managment">
			<a href="#" class="fold-button" style="float: right"> Свернуть</a>
	    	<a href="/article/{{ post.id }}" class="post-title"></a>
			<h2 class="post-title">
				<a href="http://127.0.0.1:8000/article/{{ post.id }}/">{{ post.title }}</a>
			</h2>
		</div>
	    <div class="article-info">
	        <div class="article-author">{{ post.author.username }}</div>
	        <div class="article-created-date">{{ post.created_date }}</div>
	    </div>
	    <p class="article-text">{{ post.get_excerpt }}</p>
	    <div class="one-post-shadow"></div>
	</div>
	{% endfor %}
    </div>
    <script src="{% static 'js/jquery-4.0.0.min.js' %}"></script>
   	<script src="{% static 'js/fold-post-short2.js' %}"></script>
   	<script src="{% static 'js/highlight-post.js' %}"></script>
</body>
</html>
